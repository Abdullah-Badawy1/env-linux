# ~/.tmux.conf
# Organized tmux config for tmux 3.6a

##### Prefix #####
unbind C-b
unbind-key k

set -g prefix C-Space
bind C-Space send-prefix

##### Core Behavior #####
set -g mouse on
set -g history-limit 10000
set -s escape-time 0
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
setw -g monitor-activity on
set -g visual-activity off
set -g display-panes-time 3000

##### Terminal / Colors #####
set -g default-terminal "screen-256color"
set -as terminal-overrides ',xterm-256color*:Tc'

##### Pane / Window Creation #####
unbind '"'
unbind %
bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

##### Pane Navigation / Resize #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5

bind K swap-pane -U
bind J swap-pane -D
bind -r C-h rotate-window -U
bind -r C-l rotate-window -D
bind b break-pane -d
bind m command-prompt -p "Join pane from window:" "join-pane -h -s :'%%'"
bind z resize-pane -Z

##### Window Navigation #####
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

##### Copy Mode #####
setw -g mode-keys vi
bind [ copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# One clipboard binding with fallback priority: wl-copy > xclip > xsel > tmux internal copy
if-shell 'command -v wl-copy >/dev/null 2>&1' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"' \
  'if-shell "command -v xclip >/dev/null 2>&1" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel \"xclip -in -selection clipboard\"" \
    "if-shell \"command -v xsel >/dev/null 2>&1\" \
      \"bind -T copy-mode-vi y send -X copy-pipe-and-cancel \\\"xsel -ib\\\"\" \
      \"bind -T copy-mode-vi y send -X copy-selection-and-cancel\""'

##### Status Line #####
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left-length 20
set -g status-right-length 50
set -g status-left '#[fg=colour233,bg=colour241,bold] #S #[fg=colour241,bg=colour235,nobold]'
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour208
set -g message-style bg=colour166,fg=colour232

##### Session / Safety #####
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
bind s choose-tree -sZ -O name
bind S setw synchronize-panes \; display-message "Synchronize-panes #{?pane_synchronized,ON,OFF}"
bind C-l send-keys C-l \; clear-history
bind X confirm-before -p "Kill window #W? (y/n)" kill-window
#bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind '&' confirm-before -p "Kill window #W? (y/n)" kill-window
bind q confirm-before -p "Kill session #S? (y/n)" kill-session
